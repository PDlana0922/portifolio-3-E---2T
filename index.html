<!DOCTYPE html> <!--o DocType indica a linguagem de programação que está-->
<html lang="pt-br">i <!--inicio do codigo\\-->
<head> <!--inicio do cabeçalho do documento. Dentro dessa tag pode ser inseridas folhas de estilo e scripts\\-->
    <meta charset="UTF-8"><!--indica qual será os caracters (character set ou charset) será utilizado para renderizar o texto da da paginá\\-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portifolio</title><!-- titúlo do projeto\\-->
</head><!-- fim do cabeçalho do documento\\-->
<body><!--nesse espaço está contido o conteúdo visual da página. As tags que representam texto, botoẽs e outros devem ser adcionados nesse intervalo\\-->
    <!-- Um documento HTML é composto por tags que são escritas entre < >, As tags preecisam sar abertas e fechadas, o que as diferenciam é que as tags de fechamento possuem uma \ antes do nome. Alguns código não precisam da <\> para fechamento, apenas da barra, como o caso da tag meta.Outo aspecto importante da limguagem é que ela é case insensitive, ou seja, nao leva em consideração a diferença entre letras oficiais e minúsculas.-->
<!--No HTML há seis níveis de cabeçalhos|títulos que podem ser usados por meios das tags h1, h2, h3, h4, h5 e h6, sendo o h1 o maior e mais relevante e o h6 o menor|menos relevante -->
<h1> Portifolio</h1>
<h2>Progamação</h2>
<h3>HTML</h3>
<h4>CSS</h4>
<h5>JS</h5>
<h6>matemática</h6>
<!-- Parágrafos de texto são gerados em HTML por meio das tags <P> <\P>. Esse é um exemplo de tag cuja-->




</body><!--fechamento da tag.\\-->
</html><!--fim do código\\-->
